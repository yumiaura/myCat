name: Build .deb

# Same tag trigger as publish.yml / release-binaries.yml. Wraps the PyInstaller
# onefile Linux binary in a Debian package and attaches it to the GitHub Release
# for that tag. Kept in its own workflow so it stays independent of the native
# binary matrix. Also dispatchable to produce the .deb as an artefact without a
# real release tag.

on:
  push:
    tags:
      - "*.*.*"
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write   # attach the .deb to the GitHub Release

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          # openai is optional, but a frozen binary can't pip-install later —
          # bundling it here makes --openai work out of the box.
          pip install openai

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm mycat.spec

      - name: Assemble .deb
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # Non-tag (manual dispatch) build: take the version from pyproject so a
            # dispatched build of a release commit yields a correctly-versioned
            # package — e.g. to backfill a release that predates this workflow.
            VERSION="$(grep -m1 -E '^version *= *' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          PKG="mycat_${VERSION}_amd64"
          root="pkg/${PKG}"
          mkdir -p "$root/DEBIAN" \
                   "$root/usr/bin" \
                   "$root/usr/share/applications" \
                   "$root/usr/share/icons/hicolor/256x256/apps"
          install -m0755 dist/mycat "$root/usr/bin/mycat"
          install -m0644 packaging/mycat.desktop "$root/usr/share/applications/mycat.desktop"
          install -m0644 packaging/mycat.png "$root/usr/share/icons/hicolor/256x256/apps/mycat.png"
          sed "s/@VERSION@/${VERSION}/" packaging/control.in > "$root/DEBIAN/control"
          dpkg-deb --root-owner-group --build "$root"
          mv "pkg/${PKG}.deb" "${PKG}.deb"
          echo "::group::deb info";     dpkg-deb --info "${PKG}.deb";     echo "::endgroup::"
          echo "::group::deb contents"; dpkg-deb --contents "${PKG}.deb"; echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: mycat-deb
          path: mycat_*_amd64.deb
          if-no-files-found: error

      - name: Attach .deb to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mycat_*_amd64.deb
          fail_on_unmatched_files: true
