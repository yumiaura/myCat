name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Qt's offscreen platform plugin needs a few system libs even headless.
      - name: Install Qt runtime libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          # [calendar] pulls icalendar/recurring-ical-events so the calendar
          # tests actually run (they hard-require the parser libs).
          pip install .[calendar]

      - name: Ruff
        run: ruff check .

      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q
