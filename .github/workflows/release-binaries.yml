name: Release binaries

# Triggered by the same tag pattern as publish.yml (PyPI). On tag push we
# build native binaries for Windows + macOS (Apple Silicon arm64 + Intel x64)
# in parallel, then attach them to the GitHub Release matching that tag.
#
# Also dispatchable manually so the workflow can be tested without burning
# a real release tag — the dispatch run uploads artefacts but skips the
# Release step.

on:
  push:
    tags:
      - "*.*.*"
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write   # needed for the gh-release step

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          # openai is an optional dep, but a frozen exe can't `pip install`
          # later — bundling it here makes --openai work out of the box.
          pip install openai

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm mycat.spec

      - name: Rename artefact
        shell: bash
        run: |
          # Version-less name so /releases/latest/download/<name> is a stable link.
          mv dist/mycat.exe "dist/mycat-windows-x64.exe"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: mycat-windows
          path: dist/mycat-windows-x64.exe
          if-no-files-found: error

  build-macos:
    # macos-14 is Apple Silicon (arm64). The Intel (x64) build is build-macos-intel.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install openai

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm mycat.spec

      - name: Zip .app bundle
        run: |
          cd dist
          # ditto is the recommended way to zip a macOS bundle — preserves
          # extended attrs/resource forks unlike plain `zip -r`. Version-less
          # name so /releases/latest/download/<name> is a stable link.
          ditto -c -k --keepParent mycat.app "mycat-macos-arm64.zip"
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: mycat-macos
          path: dist/mycat-macos-arm64.zip
          if-no-files-found: error

  build-macos-intel:
    # macos-15-intel is GitHub's x86_64 runner (macos-13 was retired Dec 2025;
    # macos-15-intel is the last Intel image, supported until ~Aug 2027). Mirrors
    # build-macos exactly; only the runner arch and the ``-macos-x64`` suffix
    # differ.
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install openai

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm mycat.spec

      - name: Zip .app bundle
        run: |
          cd dist
          # ditto is the recommended way to zip a macOS bundle — preserves
          # extended attrs/resource forks unlike plain `zip -r`. Version-less
          # name so /releases/latest/download/<name> is a stable link.
          ditto -c -k --keepParent mycat.app "mycat-macos-x64.zip"
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: mycat-macos-intel
          path: dist/mycat-macos-x64.zip
          if-no-files-found: error

  release:
    # Only attach to a Release on real tag pushes — dispatch runs just
    # produce downloadable artefacts.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach binaries to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mycat-windows/*
            artifacts/mycat-macos/*
            artifacts/mycat-macos-intel/*
          fail_on_unmatched_files: true
          # Auto-generated notes from PRs/commits since the previous tag.
          generate_release_notes: true
