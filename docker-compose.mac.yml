services:
  mycat:
    build:
      context: .
    image: mycat:local
    container_name: mycat-app-mac
    pull_policy: never
    env_file:
      - .env

    environment:
      - QT_QPA_PLATFORM=xcb
      - DISPLAY=host.docker.internal:0
      - LIBGL_ALWAYS_INDIRECT=1

    volumes:
      - ./mycat:/app/mycat
    restart: "no"